name: Commit lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Conventional Commits check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit subjects
        shell: bash
        run: |
          set -eu

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}..HEAD"
          else
            range="${{ github.event.before }}..${{ github.sha }}"
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              range="HEAD~0..HEAD"
            fi
          fi

          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9_./-]+\))?!?: .+'
          fail=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            sha=${line%% *}
            subject=${line#* }
            case "$subject" in
              "Merge "*|"Revert "*|"fixup! "*|"squash! "*|"amend! "*) continue ;;
            esac
            if ! printf '%s' "$subject" | grep -qE "$pattern"; then
              echo "::error::commit $sha — '$subject' is not Conventional Commits"
              fail=1
            fi
          done < <(git log --format='%H %s' "$range" 2>/dev/null || true)

          exit "$fail"
